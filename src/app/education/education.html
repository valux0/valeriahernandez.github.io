<section class="education-section">
  <h2>Education</h2>
  <div class="timeline">
    <!-- Nueva sintaxis @for de Angular 18/20 -->
    @for (edu of (educacion$ | async); track edu) {
      <div class="timeline-item">
        <div class="red-marker"></div>
        <div class="edu-content">
          <span class="dates">{{ edu.startDate }} - {{ edu.endDate }}</span>
          <h3>{{ edu.degree }}</h3>
          <p class="institution">{{ edu.institution }}</p>
        </div>
      </div>
    } @empty {
      <p>Cargando educación o no hay datos...</p>
    }
  </div>
</section>
